<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" rx="16" fill="url(#bg)" stroke="#bbf7d0" stroke-width="2"/>
  <!-- Car body -->
  <path d="M200,320 L220,250 Q280,200 520,200 L580,250 L600,320 Z" fill="#16a34a" opacity="0.15" stroke="#16a34a" stroke-width="1.5"/>
  <!-- Windshield -->
  <path d="M260,250 L290,210 Q400,195 510,210 L540,250 Z" fill="#16a34a" opacity="0.08"/>
  <!-- Wheels -->
  <circle cx="280" cy="330" r="35" fill="white" stroke="#16a34a" stroke-width="2"/>
  <circle cx="280" cy="330" r="18" fill="#16a34a" opacity="0.2"/>
  <circle cx="520" cy="330" r="35" fill="white" stroke="#16a34a" stroke-width="2"/>
  <circle cx="520" cy="330" r="18" fill="#16a34a" opacity="0.2"/>
  <!-- Road line -->
  <line x1="100" y1="370" x2="700" y2="370" stroke="#16a34a" stroke-width="2" opacity="0.2" stroke-dasharray="12,8"/>
  <!-- Plate -->
  <rect x="340" y="285" width="120" height="25" rx="4" fill="white" stroke="#16a34a" stroke-width="1"/>
  <text x="400" y="303" font-family="monospace" font-size="11" fill="#16a34a" text-anchor="middle" font-weight="700">DK-3921-A</text>
  <!-- Label -->
  <text x="400" y="430" font-family="system-ui,sans-serif" font-size="13" fill="#16a34a" text-anchor="middle" font-weight="600">Photo du véhicule</text>
  <text x="400" y="460" font-family="system-ui,sans-serif" font-size="11" fill="#16a34a" text-anchor="middle" opacity="0.6">Document de démonstration — DemDem Admin</text>
</svg>
